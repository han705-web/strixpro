{% extends "base.html" %}
{% block title %}注册{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="bg-gray-900 rounded-xl border border-gray-800 p-8">
        <h1 class="text-2xl font-light mb-2">注册</h1>
        <p class="text-gray-400 text-sm mb-6">创建你的 StrixPro 账户</p>

        <div id="error-msg" class="hidden bg-red-900/50 border border-red-800 text-red-300 px-4 py-3 rounded-lg mb-4 text-sm"></div>
        <div id="success-msg" class="hidden bg-green-900/50 border border-green-800 text-green-300 px-4 py-3 rounded-lg mb-4 text-sm"></div>

        <form id="register-form" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">邮箱</label>
                <input type="email" id="email" required
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-cyan-500 transition">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">用户名（可选）</label>
                <input type="text" id="username"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-cyan-500 transition">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">密码</label>
                <input type="password" id="password" required minlength="6"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-cyan-500 transition">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">确认密码</label>
                <input type="password" id="password2" required minlength="6"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-cyan-500 transition">
            </div>
            <button type="submit"
                class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 text-white py-2.5 rounded-lg font-medium hover:opacity-90 transition text-sm">
                注册
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            已有账户？
            <a href="/login" class="text-cyan-400 hover:text-cyan-300 transition">登录</a>
        </p>
    </div>
</div>

<script>
document.getElementById('register-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const errEl = document.getElementById('error-msg');
    const okEl = document.getElementById('success-msg');
    errEl.classList.add('hidden');
    okEl.classList.add('hidden');

    const pwd = document.getElementById('password').value;
    const pwd2 = document.getElementById('password2').value;
    if (pwd !== pwd2) {
        errEl.textContent = '两次密码不一致';
        errEl.classList.remove('hidden');
        return;
    }

    const res = await fetch('/api/v1/auth/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            email: document.getElementById('email').value,
            username: document.getElementById('username').value,
            password: pwd,
        }),
    });
    const data = await res.json();

    if (data.success) {
        localStorage.setItem('strixpro_token', data.token);
        localStorage.setItem('strixpro_username', data.username);
        okEl.textContent = '注册成功！正在跳转...';
        okEl.classList.remove('hidden');
        setTimeout(() => window.location.href = '/profile', 1000);
    } else {
        errEl.textContent = data.error || '注册失败';
        errEl.classList.remove('hidden');
    }
});
</script>
{% endblock %}
