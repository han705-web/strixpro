{% extends "base.html" %}
{% block title %}登录{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="bg-gray-900 rounded-xl border border-gray-800 p-8">
        <h1 class="text-2xl font-light mb-2">登录</h1>
        <p class="text-gray-400 text-sm mb-6">登录到你的 StrixPro 账户</p>

        <div id="error-msg" class="hidden bg-red-900/50 border border-red-800 text-red-300 px-4 py-3 rounded-lg mb-4 text-sm"></div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">邮箱</label>
                <input type="email" id="email" required
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-cyan-500 transition">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">密码</label>
                <input type="password" id="password" required minlength="6"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-cyan-500 transition">
            </div>
            <button type="submit"
                class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 text-white py-2.5 rounded-lg font-medium hover:opacity-90 transition text-sm">
                登录
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            还没有账户？
            <a href="/register" class="text-cyan-400 hover:text-cyan-300 transition">注册</a>
        </p>
    </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const errEl = document.getElementById('error-msg');
    errEl.classList.add('hidden');

    const res = await fetch('/api/v1/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
        }),
    });
    const data = await res.json();

    if (data.success) {
        localStorage.setItem('strixpro_token', data.token);
        localStorage.setItem('strixpro_username', data.username);
        window.location.href = '/profile';
    } else {
        errEl.textContent = data.error || '登录失败';
        errEl.classList.remove('hidden');
    }
});
</script>
{% endblock %}
