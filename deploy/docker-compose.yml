version: "3.8"

services:
  strixpro:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: strixpro/strixpro:latest
    container_name: strixpro
    ports:
      - "8765:8765"
    volumes:
      - strixpro_data:/data
      - ./plugins:/app/plugins
    environment:
      - STRIXPRO_CONFIG=/data/config/strixpro.json
      - STRIXPRO_LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  strixpro_data:
